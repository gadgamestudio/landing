<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gad Game Studio | Official Website</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --text-color: #c5c6c7;
            --accent-color: #66fcf1;
            --accent-hover: #45a29e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #858688;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.1);
        }

        .btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.4);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: #454545;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GAD GAMES STUDIO</h1>
        <div class="subtitle">Mobile Game Development</div>
        
        <p>We craft engaging mobile games and applications. Our website is currently under reconstruction, but you can explore and play our latest projects on the store!</p>
        
        <a href="https://play.google.com/store/apps/dev?id=5228843744561374076" class="btn" target="_blank">
            Our Games on Google Play
        </a>

        <div class="footer">
            &copy; 2026 Gad Game Studio. All rights reserved.
        </div>
    </div>

</body>
</html>
